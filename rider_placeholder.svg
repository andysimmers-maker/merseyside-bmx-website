<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1e1e1e"/>
  <!-- subtle texture lines -->
  <rect width="400" height="400" fill="url(#grain)" opacity="0.03"/>
  <!-- silhouette -->
  <g fill="#333333">
    <!-- head -->
    <circle cx="200" cy="130" r="52"/>
    <!-- body -->
    <ellipse cx="200" cy="290" rx="80" ry="90"/>
    <!-- neck -->
    <rect x="182" y="176" width="36" height="30" rx="4"/>
  </g>
  <!-- subtle border -->
  <rect width="400" height="400" fill="none" stroke="#2a2a2a" stroke-width="2"/>
</svg>
